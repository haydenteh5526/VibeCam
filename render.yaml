services:
  - type: web
    name: vibecam-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: VIBECAM_MAX_UPLOAD_BYTES
        value: "52428800"
      - key: VIBECAM_UPLOAD_TTL_MINUTES
        value: "15"
